<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Studio - 萬用全功能轉換器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        #dropZone.dragover { border-color: #6366f1; background-color: #eef2ff; }
        #reverseOrder:checked ~ .dot { transform: translateX(100%); }
        #reverseOrder:checked ~ div { background-color: #6366f1; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="gradient-bg text-white py-8 px-4 shadow-lg mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-3">
                    <i class="fas fa-sync-alt"></i> GPX Studio Pro
                </h1>
                <p class="mt-2 opacity-80 text-sm">支援純座標、GPX、JSON 互轉及首爾格式資料夾合併</p>
            </div>
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 space-y-4">
                <div id="dropZone" class="bg-white rounded-xl shadow-md p-6 border-2 border-dashed border-gray-200 transition-all">
                    <div class="flex items-center justify-between mb-4">
                        <label class="font-semibold text-gray-700 flex items-center gap-2">
                            <i class="fas fa-edit text-indigo-500"></i> 輸入數據 / 檔案讀取
                        </label>
                        <div class="flex gap-2">
                            <input type="file" id="folderInput" class="hidden" webkitdirectory directory multiple>
                            <button onclick="document.getElementById('folderInput').click()" class="text-xs bg-indigo-50 text-indigo-600 px-2 py-1 rounded hover:bg-indigo-100 transition-colors font-bold">
                                <i class="fas fa-folder-open"></i> 讀取首爾格式資料夾 (B0-Bn)
                            </button>
                        </div>
                    </div>
                    
                    <textarea id="inputData" 
                        class="w-full h-96 p-4 border border-gray-100 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-xs bg-gray-50 mb-2"
                        placeholder="選取資料夾或在此貼上座標..."></textarea>
                    
                    <p class="text-[10px] text-gray-400 italic text-right">* 智慧解析已啟動：自動過濾雜訊數字並移除重複點</p>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                    <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fas fa-cog text-indigo-500"></i> 轉換設定
                    </h3>
                    
                    <div class="space-y-4">
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" id="reverseOrder" class="sr-only">
                                <div class="block bg-gray-200 w-10 h-6 rounded-full transition-colors"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                            </div>
                            <span class="ml-3 text-sm text-gray-600">🔄 順序反轉 (倒序)</span>
                        </label>

                        <hr class="border-gray-100">

                        <div class="space-y-3">
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">輸出目標格式</p>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50">
                                <input type="radio" name="format" value="trk" checked class="text-indigo-600">
                                <div class="ml-3"><span class="block text-sm font-bold text-gray-700">🛰️ 標準軌跡版 (trk)</span></div>
                            </label>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50">
                                <input type="radio" name="format" value="wpt" class="text-indigo-600">
                                <div class="ml-3"><span class="block text-sm font-bold text-gray-700">🚩 飛妹專用版 (wpt)</span></div>
                            </label>
                        </div>
                    </div>

                    <button onclick="processAndDownload()" 
                        class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> 開始轉換並下載
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const inputArea = document.getElementById('inputData');
        const folderInput = document.getElementById('folderInput');

        folderInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            // 核心邏輯：只抓 B 開頭且檔名是純數字的檔案，忽略 path
            const bFiles = files.filter(f => f.name.match(/^B\d+$/i));

            bFiles.sort((a, b) => {
                const numA = parseInt(a.name.substring(1));
                const numB = parseInt(b.name.substring(1));
                return numA - numB;
            });

            let combinedContent = "";
            for (let file of bFiles) {
                combinedContent += await file.text() + "\n";
            }

            // 如果沒抓到 B 檔案，才去讀取 path
            if (bFiles.length === 0) {
                const pathFile = files.find(f => f.name.toLowerCase() === 'path');
                if (pathFile) combinedContent = await pathFile.text();
            }

            inputArea.value = combinedContent;
            alert(`讀取完成：串接了 ${bFiles.length} 個 B 檔案的細節路徑`);
        });

        function extractCoords(text) {
            let pts = [];

            // 1. 先判斷是否為首爾 JSON 格式或 B 檔案陣列格式
            try {
                const data = JSON.parse(text);
                if (Array.isArray(data)) {
                    data.forEach(item => {
                        // 如果是 B 檔案內部的格式: [lat, lng, lat, lng...]
                        if (typeof item === 'number' && data.length >= 2) {
                            // 這邊直接處理整串數字陣列，跳出迴圈
                            for(let i=0; i < data.length; i+=2) {
                                if (data[i+1]) pts.push([data[i], data[i+1]]);
                            }
                            throw 'done'; 
                        }
                        // 如果是 path 檔案內部的字串化內層 JSON
                        try {
                            const inner = typeof item === 'string' ? JSON.parse(item) : item;
                            if (inner.beginPointlat) pts.push([inner.beginPointlat, inner.beginPointlng]);
                            if (inner.endPointlat) pts.push([inner.endPointlat, inner.endPointlng]);
                        } catch(e) {}
                    });
                }
            } catch (e) { if(e !== 'done') {} }

            if (pts.length > 0) return finalizeCoords(pts);

            // 2. 判斷是否為 GPX XML
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const xmlPts = xmlDoc.querySelectorAll("trkpt, wpt");
            if (xmlPts.length > 0) {
                xmlPts.forEach(p => pts.push([p.getAttribute("lat"), p.getAttribute("lon")]));
                return finalizeCoords(pts);
            }

            // 3. 通用正規表達式 (修正：必須是合理的經緯度範圍)
            const regex = /(-?\d{1,3}\.\d{5,15})/g; 
            let matches = text.match(regex);
            if (matches && matches.length >= 2) {
                for (let i = 0; i < matches.length; i += 2) {
                    let lat = parseFloat(matches[i]);
                    let lng = parseFloat(matches[i+1]);
                    // 過濾掉像 7.76, 0.1 這種明顯不是座標的數據 (首爾緯度 37)
                    if (Math.abs(lat) > 10 && Math.abs(lng) > 10) {
                        if (Math.abs(lat) <= 90) pts.push([lat, lng]);
                        else pts.push([lng, lat]);
                    }
                }
            }
            
            return finalizeCoords(pts);
        }

        function finalizeCoords(coords) {
            return coords.map(c => {
                let lat = parseFloat(c[0]);
                let lng = parseFloat(c[1]);
                lng = ((lng + 180) % 360 + 360) % 360 - 180;
                return [lat, lng];
            }).filter((c, index, self) => {
                if (isNaN(c[0]) || isNaN(c[1])) return false;
                if (index === 0) return true;
                // 重複點過濾：只要跟前一點距離極近(或相同)就刪除
                const dist = Math.abs(c[0] - self[index-1][0]) + Math.abs(c[1] - self[index-1][1]);
                return dist > 0.0000001; 
            });
        }

        function processAndDownload() {
            const rawData = inputArea.value.trim();
            if (!rawData) return alert("請先輸入數據！");
            let coords = extractCoords(rawData);
            if (coords.length === 0) return alert("找不到座標！");
            if (document.getElementById('reverseOrder').checked) coords.reverse();

            const format = document.querySelector('input[name="format"]:checked').value;
            const now = new Date().toISOString();
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            if (format === 'wpt') {
                gpx += `<gpx version="1.1" xmlns="http://www.topografix.com/GPX/1/1">\n`;
                coords.forEach((p, i) => {
                    gpx += `\t<wpt lat="${p[0]}" lon="${p[1]}"><name>PT-${(i+1).toString().padStart(3, '0')}</name></wpt>\n`;
                });
            } else {
                gpx += `<gpx version="1.1" xmlns="http://www.topografix.com/GPX/1/1">\n\t<trk>\n\t\t<name>Export</name>\n\t\t<trkseg>\n`;
                coords.forEach(p => gpx += `\t\t\t<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`);
                gpx += `\t\t</trkseg>\n\t</trk>\n`;
            }
            gpx += `</gpx>`;
            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `GPX_FIXED_${new Date().getTime()}.gpx`; a.click();
        }
    </script>
</body>
</html>
