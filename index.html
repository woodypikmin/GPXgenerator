<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Studio - 萬用轉換器 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        #dropZone.dragover { border-color: #6366f1; background-color: #eef2ff; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="gradient-bg text-white py-8 px-4 shadow-lg mb-8">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-3">
                    <i class="fas fa-sync-alt"></i> GPX Studio Pro
                </h1>
                <p class="mt-2 opacity-80 text-sm">支援 ZIP, GPX, JSON 檔案拖放與格式互轉</p>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 space-y-4">
                <div id="dropZone" class="bg-white rounded-xl shadow-md p-6 border-2 border-dashed border-gray-200 transition-all">
                    <div class="flex items-center justify-between mb-4">
                        <label class="font-semibold text-gray-700 flex items-center gap-2">
                            <i class="fas fa-file-import text-indigo-500"></i> 數據輸入 / 檔案拖放
                        </label>
                        <span class="text-xs text-gray-400">可直接拖入 .zip, .gpx, .json</span>
                    </div>
                    <textarea id="inputData" 
                        class="w-full h-96 p-4 border border-gray-100 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-xs bg-gray-50"
                        placeholder="在此貼上座標、JSON 內容，或是將檔案拖放到這裡..."></textarea>
                    <input type="file" id="fileInput" class="hidden" accept=".zip,.gpx,.json,.txt">
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 text-xs text-indigo-600 hover:underline">
                        <i class="fas fa-upload"></i> 改用上傳檔案
                    </button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                    <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fas fa-cog text-indigo-500"></i> 轉換設定
                    </h3>
                    
                    <div class="space-y-4">
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" id="reverseOrder" class="sr-only">
                                <div class="block bg-gray-200 w-10 h-6 rounded-full transition-colors peer-checked:bg-indigo-600"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                            </div>
                            <span class="ml-3 text-sm text-gray-600">🔄 順序反轉</span>
                        </label>

                        <hr class="border-gray-100">

                        <div class="space-y-3">
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">輸出格式目標</p>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500">
                                <input type="radio" name="format" value="trk" checked class="text-indigo-600">
                                <div class="ml-3">
                                    <span class="block text-sm font-bold text-gray-700 font-mono">trk (軌跡)</span>
                                </div>
                            </label>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500">
                                <input type="radio" name="format" value="wpt" class="text-indigo-600">
                                <div class="ml-3">
                                    <span class="block text-sm font-bold text-gray-700 font-mono">wpt (飛妹)</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button onclick="processAndDownload()" 
                        class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> 開始轉換並下載
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const inputArea = document.getElementById('inputData');
        const dropZone = document.getElementById('dropZone');

        // 處理拖放檔案
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        };

        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);

        async function handleFiles(files) {
            const file = files[0];
            if (!file) return;

            if (file.name.endsWith('.zip')) {
                const zip = await JSZip.loadAsync(file);
                for (let filename in zip.files) {
                    if (filename.match(/\.(gpx|json|txt)$/i)) {
                        inputArea.value = await zip.files[filename].async("string");
                        break; // 抓到第一個就停止，可視需求改為合併
                    }
                }
            } else {
                const text = await file.text();
                inputArea.value = text;
            }
        }

        function extractCoords(text) {
            let coords = [];
            // 嘗試解析 JSON (巴西花田格式)
            try {
                const data = JSON.parse(text);
                const waypoints = data.routes?.[0]?.waypoints || data.waypoints || [];
                if (waypoints.length > 0) {
                    return waypoints.map(w => [w.lat, w.lng]);
                }
            } catch (e) { /* 不是 JSON */ }

            // 嘗試解析 GPX (從 XML 中提取 lat/lon)
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const pts = xmlDoc.querySelectorAll("trkpt, wpt");
            if (pts.length > 0) {
                pts.forEach(p => coords.push([p.getAttribute("lat"), p.getAttribute("lon")]));
                return coords;
            }

            // 嘗試解析一般文字座標 (原本的正則解析)
            const lines = text.split('\n').map(line => {
                return line.trim().split(/[\s,;]+/).filter(part => !isNaN(parseFloat(part)));
            }).filter(parts => parts.length >= 2);
            
            return lines.map(p => [p[0], p[1]]);
        }

        function processAndDownload() {
            const rawData = inputArea.value.trim();
            if (!rawData) return alert("⚠️ 請輸入數據或拖入檔案！");

            let coords = extractCoords(rawData);
            if (coords.length === 0) return alert("⚠️ 無法讀取到任何座標！");

            if (document.getElementById('reverseOrder').checked) coords.reverse();

            const format = document.querySelector('input[name="format"]:checked').value;
            const now = new Date().toISOString();
            let gpxContent = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            
            if (format === 'wpt') {
                gpxContent += `<gpx xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns="http://www.topografix.com/GPX/1/1" version="1.1" creator="ARMate">\n`;
                coords.forEach((p, i) => {
                    gpxContent += `\t<wpt lat="${p[0]}" lon="${p[1]}">\n\t\t<time>${now}</time>\n\t\t<name>PT-${(i+1).toString().padStart(2, '0')}</name>\n\t</wpt>\n`;
                });
            } else {
                gpxContent += `<gpx version="1.1" creator="GPX_Studio_Pro" xmlns="http://www.topografix.com/GPX/1/1">\n\t<trk>\n\t\t<name>Converted_Track</name>\n\t\t<trkseg>\n`;
                coords.forEach(p => {
                    gpxContent += `\t\t\t<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`;
                });
                gpxContent += `\t\t</trkseg>\n\t</trk>\n`;
            }
            gpxContent += `</gpx>`;

            const blob = new Blob([gpxContent], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Converted_${new Date().getTime()}.gpx`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>

    <style>
        #reverseOrder:checked ~ .dot { transform: translateX(100%); }
        #reverseOrder:checked ~ div { background-color: #6366f1; }
    </style>
</body>
</html>
