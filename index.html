<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Studio - 資料夾批量轉換器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        #dropZone.dragover { border-color: #6366f1; background-color: #eef2ff; }
        #reverseOrder:checked ~ .dot { transform: translateX(100%); }
        #reverseOrder:checked ~ div { background-color: #6366f1; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="gradient-bg text-white py-8 px-4 shadow-lg mb-8">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-3">
                    <i class="fas fa-folder-open"></i> GPX Studio Pro
                </h1>
                <p class="mt-2 opacity-80 text-sm">支援選取「路線資料夾」自動合併 B0-Bnn 座標檔</p>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 space-y-4">
                <div id="dropZone" class="bg-white rounded-xl shadow-md p-6 border-2 border-dashed border-gray-200 transition-all">
                    <div class="flex items-center justify-between mb-4">
                        <label class="font-semibold text-gray-700 flex items-center gap-2">
                            <i class="fas fa-file-import text-indigo-500"></i> 資料夾上傳區
                        </label>
                        <span id="fileCount" class="text-xs text-indigo-500 font-bold">尚未讀取檔案</span>
                    </div>
                    
                    <div class="flex flex-col items-center justify-center py-8 border-b border-gray-100 mb-4">
                        <input type="file" id="folderInput" class="hidden" webkitdirectory directory multiple>
                        <button onclick="document.getElementById('folderInput').click()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg hover:bg-indigo-700 transition-all">
                            <i class="fas fa-folder-plus"></i> 選取路徑資料夾
                        </button>
                        <p class="text-[10px] text-gray-400 mt-2">點擊按鈕並選擇包含 B0、B1 及 path 的資料夾</p>
                    </div>

                    <textarea id="inputData" 
                        class="w-full h-64 p-4 border border-gray-100 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-xs bg-gray-50"
                        placeholder="選取資料夾後，座標內容將自動解析並填入此處..."></textarea>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                    <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fas fa-cog text-indigo-500"></i> 轉換設定
                    </h3>
                    
                    <div class="space-y-4">
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" id="reverseOrder" class="sr-only">
                                <div class="block bg-gray-200 w-10 h-6 rounded-full transition-colors"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                            </div>
                            <span class="ml-3 text-sm text-gray-600">🔄 順序反轉 (倒序)</span>
                        </label>

                        <hr class="border-gray-100">

                        <div class="space-y-3">
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mt-4">輸出格式目標</p>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500">
                                <input type="radio" name="format" value="trk" checked class="text-indigo-600">
                                <div class="ml-3">
                                    <span class="block text-sm font-bold text-gray-700 font-mono">trk (標準軌跡)</span>
                                </div>
                            </label>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500">
                                <input type="radio" name="format" value="wpt" class="text-indigo-600">
                                <div class="ml-3">
                                    <span class="block text-sm font-bold text-gray-700 font-mono">wpt (飛妹專用)</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button onclick="processAndDownload()" 
                        class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> 立即轉換並下載
                    </button>
                </div>
                
                <div class="bg-indigo-50 p-4 rounded-xl text-[10px] text-indigo-700 leading-relaxed shadow-sm border border-indigo-100">
                    <p><b>資料夾讀取說明：</b></p>
                    <ul class="list-disc ml-4 mt-1">
                        <li>會自動尋找檔名為 <b>B</b> 開頭的座標檔。</li>
                        <li>自動依 B0, B1, B2... 數字順序串接路徑。</li>
                        <li>若存在 <b>path</b> 檔案，會一併提取其中的起終點數據。</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        const inputArea = document.getElementById('inputData');
        const folderInput = document.getElementById('folderInput');
        const fileCountText = document.getElementById('fileCount');

        folderInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            // 1. 分類檔案：區分 B 開頭檔案與 path 檔案
            const bFiles = files.filter(f => f.name.match(/^B\d+$/i));
            const pathFiles = files.filter(f => f.name.toLowerCase() === 'path');

            // 2. 對 B 檔案進行「數字排序」，防止出現 B1, B10, B2 這種亂序
            bFiles.sort((a, b) => {
                const numA = parseInt(a.name.replace(/\D/g, ''));
                const numB = parseInt(b.name.replace(/\D/g, ''));
                return numA - numB;
            });

            fileCountText.innerText = `讀取中... (共 ${files.length} 個檔案)`;
            let combinedContent = "";

            // 3. 讀取所有檔案內容
            for (let file of bFiles) {
                combinedContent += await file.text() + "\n";
            }
            for (let file of pathFiles) {
                combinedContent += await file.text() + "\n";
            }

            inputArea.value = combinedContent;
            fileCountText.innerText = `✅ 已讀取 ${bFiles.length} 個座標段 + path`;
        });

        function extractCoords(text) {
            let allCoords = [];
            
            // 強力 Regex 模式：捕捉任何看起來像座標的 [數字, 數字] 或是 "lat": 數字
            // 同時處理你提供的 JSON 轉義字元格式
            const regex = /(-?\d{1,3}\.\d{5,15})/g; 
            let matches = text.match(regex);
            
            if (matches && matches.length >= 2) {
                for (let i = 0; i < matches.length; i += 2) {
                    let lat = parseFloat(matches[i]);
                    let lng = parseFloat(matches[i+1]);
                    
                    // 地理防呆：首爾緯度約 37，經度約 126
                    // 如果緯度 > 90 代表抓反了
                    if (Math.abs(lat) <= 90) {
                        allCoords.push([lat, lng]);
                    } else {
                        allCoords.push([lng, lat]);
                    }
                }
            }
            
            return finalizeCoords(allCoords);
        }

        function finalizeCoords(coords) {
            return coords.map(c => {
                let lat = parseFloat(c[0]);
                let lng = parseFloat(c[1]);
                // 經度溢位修正
                lng = ((lng + 180) % 360 + 360) % 360 - 180;
                return [lat, lng];
            }).filter((c, index, self) => {
                // 移除無效值與完全重複的點
                if (isNaN(c[0]) || isNaN(c[1])) return false;
                if (index === 0) return true;
                return c[0] !== self[index-1][0] || c[1] !== self[index-1][1];
            });
        }

        function processAndDownload() {
            const rawData = inputArea.value.trim();
            if (!rawData) return alert("⚠️ 請先選取資料夾或貼入數據！");

            let coords = extractCoords(rawData);
            if (coords.length === 0) return alert("⚠️ 無法從選取的檔案中讀取到座標！");

            if (document.getElementById('reverseOrder').checked) coords.reverse();

            const format = document.querySelector('input[name="format"]:checked').value;
            const now = new Date().toISOString();
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            
            if (format === 'wpt') {
                gpx += `<gpx xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns="http://www.topografix.com/GPX/1/1" version="1.1" creator="ARMate">\n`;
                coords.forEach((p, i) => {
                    gpx += `\t<wpt lat="${p[0]}" lon="${p[1]}">\n\t\t<time>${now}</time>\n\t\t<name>PT-${(i+1).toString().padStart(3, '0')}</name>\n\t</wpt>\n`;
                });
            } else {
                gpx += `<gpx version="1.1" creator="GPX_Studio_Pro" xmlns="http://www.topografix.com/GPX/1/1">\n\t<trk>\n\t\t<name>Merged_Folder_Track</name>\n\t\t<trkseg>\n`;
                coords.forEach(p => {
                    gpx += `\t\t\t<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`;
                });
                gpx += `\t\t</trkseg>\n\t</trk>\n`;
            }
            gpx += `</gpx>`;

            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `GPX_Folder_Export_${new Date().getTime()}.gpx`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
