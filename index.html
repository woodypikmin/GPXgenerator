<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Studio - 智慧轉換器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .drop-active { border: 4px dashed #6366f1 !important; background-color: #eef2ff !important; }
        #reverseOrder:checked ~ .dot { transform: translateX(100%); }
        #reverseOrder:checked ~ div { background-color: #6366f1; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="gradient-bg text-white py-6 px-4 shadow-lg mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-3">
                    <i class="fas fa-sync-alt"></i> GPX Studio Pro
                </h1>
                <p class="mt-2 opacity-80 text-sm">支援座標手貼、資料夾拖曳、連續重複點自動剔除</p>
            </div>
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 space-y-4">
                <div id="dropZone" class="bg-white rounded-xl shadow-md p-6 border-2 border-dashed border-gray-200 transition-all relative">
                    <div class="flex items-center justify-between mb-4">
                        <label class="font-semibold text-gray-700 flex items-center gap-2">
                            <i class="fas fa-edit text-indigo-500"></i> 輸入數據 / 拖曳路徑資料夾
                        </label>
                        <div class="flex gap-2">
                            <input type="file" id="folderInput" class="hidden" webkitdirectory directory multiple>
                            <button onclick="document.getElementById('folderInput').click()" class="text-xs bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-200 transition-all font-bold">
                                <i class="fas fa-folder-open"></i> 手動選取資料夾
                            </button>
                        </div>
                    </div>
                    
                    <textarea id="inputData" 
                        class="w-full h-96 p-4 border border-gray-100 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-xs bg-gray-50 mb-2"
                        placeholder="在此貼上座標、JSON 或直接把 B0-Bn 資料夾拖進來..."></textarea>
                    
                    <p id="fileStatus" class="text-[10px] text-indigo-500 font-bold italic">等待匯入資料...</p>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                    <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2 border-b pb-2">
                        <i class="fas fa-cog text-indigo-500"></i> 轉換設定
                    </h3>
                    
                    <div class="space-y-4">
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" id="reverseOrder" class="sr-only">
                                <div class="block bg-gray-200 w-10 h-6 rounded-full transition-colors"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                            </div>
                            <span class="ml-3 text-sm text-gray-600 font-medium">🔄 順序反轉 (倒序)</span>
                        </label>

                        <hr class="border-gray-100">

                        <div class="space-y-3">
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">輸出目標格式</p>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500">
                                <input type="radio" name="format" value="trk" checked class="text-indigo-600">
                                <div class="ml-3"><span class="block text-sm font-bold text-gray-700">🛰️ 標準軌跡 (trk)</span></div>
                            </label>
                            <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50 has-[:checked]:border-indigo-500">
                                <input type="radio" name="format" value="wpt" class="text-indigo-600">
                                <div class="ml-3"><span class="block text-sm font-bold text-gray-700">🚩 航點模式 (wpt)</span></div>
                            </label>
                        </div>
                    </div>

                    <button onclick="processAndDownload()" 
                        class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> 轉換並下載 GPX
                    </button>
                </div>

                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 shadow-sm">
                    <h4 class="text-xs font-bold text-indigo-700 mb-2">✨ 智慧去重邏輯：</h4>
                    <p class="text-[10px] text-indigo-600 leading-relaxed">
                        已優化去重演算法。現在程式僅會刪除<b>「連續出現且座標完全相同」</b>的點（例如：1-2-2-3-3-4 會自動轉為 1-2-3-4）。若路徑折返回到原點（如 1-2-3-1），重複的點將會被保留。
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const inputArea = document.getElementById('inputData');
        const dropZone = document.getElementById('dropZone');
        const statusText = document.getElementById('fileStatus');

        // --- 拖曳功能 ---
        ['dragenter', 'dragover'].forEach(n => dropZone.addEventListener(n, (e) => {
            e.preventDefault(); dropZone.classList.add('drop-active');
        }));
        ['dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, (e) => {
            e.preventDefault(); dropZone.classList.remove('drop-active');
        }));

        dropZone.addEventListener('drop', async (e) => {
            const items = e.dataTransfer.items;
            let files = [];
            for (let i = 0; i < items.length; i++) {
                const entry = items[i].webkitGetAsEntry();
                if (entry) await scanFiles(entry, files);
            }
            handleReadFiles(files);
        });

        document.getElementById('folderInput').addEventListener('change', (e) => handleReadFiles(Array.from(e.target.files)));

        async function scanFiles(entry, fileList) {
            if (entry.isFile) {
                fileList.push(await new Promise(res => entry.file(res)));
            } else if (entry.isDirectory) {
                const reader = entry.createReader();
                const entries = await new Promise(res => reader.readEntries(res));
                for (const child of entries) await scanFiles(child, fileList);
            }
        }

        async function handleReadFiles(files) {
            const bFiles = files.filter(f => f.name.match(/^B\d+$/i));
            bFiles.sort((a, b) => parseInt(a.name.substring(1)) - parseInt(b.name.substring(1)));
            
            const other = files.filter(f => f.name.toLowerCase() === 'path' || f.name.match(/\.(gpx|json|txt)$/i));

            let content = "";
            for (let f of bFiles) content += await f.text() + "\n";
            for (let f of other) content += await f.text() + "\n";
            inputArea.value = content;
            statusText.innerText = `✅ 已載入 ${bFiles.length} 個 B 檔案及其他數據`;
        }

        // --- 核心解析邏輯 ---
        function extractCoords(text) {
            let pts = [];
            // 嘗試 JSON 
            try {
                const data = JSON.parse(text);
                const list = data.routes?.[0]?.waypoints || data.waypoints || (Array.isArray(data) ? data : []);
                list.forEach(w => {
                    let la = w.lat || w.latitude || w.beginPointlat || (Array.isArray(w) ? w[0] : null);
                    let ln = w.lng || w.longitude || w.beginPointlng || (Array.isArray(w) ? w[1] : null);
                    if (typeof la === 'string' && la.includes('{')) {
                        const inner = JSON.parse(la);
                        pts.push([inner.beginPointlat, inner.beginPointlng], [inner.endPointlat, inner.endPointlng]);
                    } else if (la !== null && !isNaN(parseFloat(la))) {
                        pts.push([la, ln]);
                    }
                });
            } catch (e) {}

            if (pts.length > 0) return finalizeCoords(pts);

            // 嘗試 XML
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const xmlPts = xml.querySelectorAll("trkpt, wpt");
            if (xmlPts.length > 0) {
                xmlPts.forEach(p => pts.push([p.getAttribute("lat"), p.getAttribute("lon")]));
                return finalizeCoords(pts);
            }

            // 強力 Regex (手 Key 座標)
            const regex = /(-?\d+\.\d+)\s*[,: \t]\s*(-?\d+\.\d+)/g;
            let m;
            while ((m = regex.exec(text)) !== null) {
                let v1 = parseFloat(m[1]), v2 = parseFloat(m[2]);
                if (Math.abs(v1) <= 90) pts.push([v1, v2]); else pts.push([v2, v1]);
            }
            return finalizeCoords(pts);
        }

        function finalizeCoords(coords) {
            let filtered = [];
            for (let i = 0; i < coords.length; i++) {
                let lat = parseFloat(coords[i][0]);
                let lng = parseFloat(coords[i][1]);
                
                // 經度校正
                lng = ((lng + 180) % 360 + 360) % 360 - 180;

                // 檢查是否連續重複 (12233441 -> 12341)
                if (filtered.length > 0) {
                    const prev = filtered[filtered.length - 1];
                    // 如果這點跟前一點座標幾乎一模一樣，就跳過不加
                    if (Math.abs(lat - prev[0]) < 0.0000001 && Math.abs(lng - prev[1]) < 0.0000001) {
                        continue;
                    }
                }
                filtered.push([lat, lng]);
            }
            return filtered;
        }

        function processAndDownload() {
            const raw = inputArea.value.trim();
            if (!raw) return alert("請輸入數據！");
            let coords = extractCoords(raw);
            if (coords.length === 0) return alert("無法識別座標！");
            if (document.getElementById('reverseOrder').checked) coords.reverse();

            const format = document.querySelector('input[name="format"]:checked').value;
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            if (format === 'wpt') {
                coords.forEach((p, i) => gpx += `\t<wpt lat="${p[0]}" lon="${p[1]}"><name>PT-${(i+1).toString().padStart(3,'0')}</name></wpt>\n`);
            } else {
                gpx += `\t<trk><name>Export</name><trkseg>\n`;
                coords.forEach(p => gpx += `\t\t<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`);
                gpx += `\t</trkseg></trk>\n`;
            }
            gpx += `</gpx>`;

            // 👇 關鍵修改點：把 application/gpx+xml 換成 Android 看得懂的 application/xml;charset=utf-8
            const blob = new Blob([gpx], { type: 'application/xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Export_${new Date().getTime()}.gpx`; a.click();
        }
    </script>
</body>
</html>
